name: Daily Insight Discussion

on:
  schedule:
    # 毎朝7:00 JST（= UTC 22:00 前日）
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      manual_topic:
        description: '手動指定トピック（空欄で自動選定）'
        required: false
        default: ''

jobs:
  send-insight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Insight
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          if [ -n "${{ github.event.inputs.manual_topic }}" ]; then
            python daily_insight.py "${{ github.event.inputs.manual_topic }}"
          else
            python daily_insight.py
          fi
